services:
  postgres:
    image: postgres:16
    container_name: theater-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: theater_db
    ports:
      - "5432:5432"
    volumes:
      - theater_pgdata:/var/lib/postgresql/data

volumes:
  theater_pgdata:
